<section class="team">
  <div class="container">
    <h2 class="team__title">Наша команда</h2>
    <ul class="team__list">
      <li class="team__item">
        <div class="team__wrap">
          <h3 class="team__name">Олександр Сібіковський</h3>
          <p class="team__position">
            Провідний інженер-проектувальник, кандидат технічних наук
          </p>
        </div>
      </li>
      <li class="team__item">
        <picture>
          <!-- Desktop -->
          <source
            media="(min-width: 1200px)"
            srcset="./images/team/img2_desktop.webp"
            type="image/webp"
          />
          <source
            media="(min-width: 1200px)"
            srcset="./images/team/img2_desktop.jpg"
            type="image/jpg"
          />
          <!-- Tablet -->
          <source
            media="(min-width: 768px)"
            srcset="./images/team/img2_table.webp"
            type="image/webp"
          />
          <source
            media="(min-width: 768px)"
            srcset="./images/team/img2_table.jpg"
            type="image/jpg"
          />
          <!-- Mobile -->
          <source
            media="(max-width: 767.5px)"
            srcset="./images/team/img2_mobile.webp"
            type="image/webp"
          />
          <source
            media="(max-width: 767.5px)"
            srcset="./images/team/img2_mobile.jpg"
            type="image/jpg"
          />
          <img
            class="team__img"
            src="./images/team/img2_mobile.jpg"
            alt="зображення чоловіка"
          />
        </picture>
        <div class="team__wrap">
          <h3 class="team__name">Віталій Віталіс</h3>
          <p class="team__position">Провідний інженер-конструктор</p>
        </div>
      </li>
      <li class="team__item">
        <div class="team__wrap">
          <h3 class="team__name">Богдан Дорошенко</h3>
          <p class="team__position">ВТВ, інженер-конструктор</p>
        </div>
      </li>
    </ul>
  </div>
</section>
